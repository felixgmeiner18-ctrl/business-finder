<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Status — handwerkerweb.at</title>
<style>
  :root {
    --bg: #0c1116; --card: #161d26; --border: #232c38;
    --text: #e6edf3; --muted: #8b98a5;
    --green: #4ade80; --amber: #fbbf24; --blue: #60a5fa; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 16px; max-width: 760px; margin: 0 auto;
  }
  h1 { font-size: 18px; display: flex; align-items: baseline; gap: 8px; }
  h1 small { color: var(--muted); font-size: 12px; font-weight: normal; }
  h2 { font-size: 13px; color: var(--muted); text-transform: uppercase;
       letter-spacing: .08em; margin: 22px 0 8px; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
           gap: 8px; margin-top: 14px; }
  .tile { background: var(--card); border: 1px solid var(--border);
          border-radius: 10px; padding: 10px 12px; }
  .tile .num { font-size: 26px; font-weight: 700; }
  .tile .lbl { font-size: 11px; color: var(--muted); }
  .tile.good .num { color: var(--green); }
  .tile.zero .num { color: var(--muted); }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 10px; padding: 4px 12px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 11px;
       text-transform: uppercase; letter-spacing: .05em; padding: 8px 8px 4px 0; }
  td { padding: 7px 8px 7px 0; border-top: 1px solid var(--border);
       white-space: nowrap; }
  td.biz { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
  .chip { font-size: 11px; padding: 2px 8px; border-radius: 99px;
          border: 1px solid var(--border); color: var(--muted); }
  .chip.sent      { color: var(--blue);  border-color: var(--blue); }
  .chip.delivered { color: var(--green); border-color: var(--green); }
  .chip.approved  { color: var(--amber); border-color: var(--amber); }
  .chip.rejected, .chip.failed { color: var(--red); border-color: var(--red); }
  .visits-yes { color: var(--green); font-weight: 700; }
  .visits-no  { color: var(--muted); }
  .row { display: flex; justify-content: space-between; gap: 12px;
         padding: 8px 0; border-top: 1px solid var(--border); font-size: 13px; }
  .row:first-child { border-top: none; }
  .row .main { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .when { color: var(--muted); flex-shrink: 0; }
  .empty { color: var(--muted); padding: 12px 0; font-size: 13px; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 18px; }
  .statuschips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .statuschips .chip { background: var(--card); }
  #error { display: none; background: #3b1d1d; border: 1px solid var(--red);
           color: var(--red); border-radius: 10px; padding: 10px 12px;
           margin-top: 12px; font-size: 13px; }
</style>
</head>
<body>
  <h1>📬 handwerkerweb.at <small id="updated">lädt…</small></h1>
  <div id="error"></div>

  <div class="tiles" id="funnel"></div>

  <h2>Briefe</h2>
  <div class="card"><table id="letters">
    <thead><tr><th>Code</th><th>Firma</th><th>Status</th><th>Gesendet</th>
               <th>Scans</th><th>Zuletzt</th></tr></thead>
    <tbody></tbody>
  </table></div>

  <h2>Letzte Scans</h2>
  <div class="card" id="scans"></div>

  <h2>Antworten (Kontaktformular)</h2>
  <div class="card" id="replies"></div>

  <h2>Leads nach Status</h2>
  <div class="statuschips" id="leadchips"></div>

  <p class="meta">Auto-Refresh alle 60 s · Zeiten in lokaler Zeit</p>

<script>
// DB stores naive UTC ISO strings — append Z so JS parses them as UTC.
function utc(s) { return s ? new Date(/[Z+]/.test(s) ? s : s + "Z") : null; }

function fmtAbs(s) {
  const d = utc(s);
  if (!d) return "—";
  return d.toLocaleDateString("de-AT", { day: "2-digit", month: "2-digit" }) +
         " " + d.toLocaleTimeString("de-AT", { hour: "2-digit", minute: "2-digit" });
}

function fmtRel(s) {
  const d = utc(s);
  if (!d) return "—";
  const mins = Math.round((Date.now() - d.getTime()) / 60000);
  if (mins < 1) return "gerade eben";
  if (mins < 60) return "vor " + mins + " min";
  if (mins < 1440) return "vor " + Math.round(mins / 60) + " Std";
  return fmtAbs(s);
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function tile(label, value, cls) {
  return `<div class="tile ${cls}"><div class="num">${value}</div>
          <div class="lbl">${label}</div></div>`;
}

function render(d) {
  const sent = (d.letters.by_status.sent || 0) + (d.letters.by_status.delivered || 0);
  const scanned = d.letters.per_letter.filter(l => l.visits > 0).length;
  document.getElementById("funnel").innerHTML =
    tile("Leads", d.leads.total, "") +
    tile("Briefe raus", sent, sent ? "" : "zero") +
    tile("Gescannt", scanned, scanned ? "good" : "zero") +
    tile("Antworten", d.replies.total, d.replies.total ? "good" : "zero") +
    tile("Kunden", d.customers.total, d.customers.total ? "good" : "zero");

  document.querySelector("#letters tbody").innerHTML =
    d.letters.per_letter.map(l => `<tr>
      <td><b>${esc(l.tracking_code)}</b></td>
      <td class="biz">${esc(l.business)}</td>
      <td><span class="chip ${esc(l.status)}">${esc(l.status)}</span></td>
      <td>${fmtAbs(l.sent_at)}</td>
      <td class="${l.visits ? "visits-yes" : "visits-no"}">${l.visits}</td>
      <td>${l.last_visit ? fmtRel(l.last_visit) : "—"}</td>
    </tr>`).join("") ||
    `<tr><td colspan="6" class="empty">Noch keine Briefe generiert.</td></tr>`;

  document.getElementById("scans").innerHTML =
    d.visits.recent.map(v => `<div class="row">
      <div class="main"><b>${esc(v.tracking_code)}</b>
        <span style="color:var(--muted)"> · ${esc((v.user_agent || "?").slice(0, 60))}</span></div>
      <div class="when">${fmtRel(v.visited_at)}</div>
    </div>`).join("") ||
    `<div class="empty">Noch keine Scans. (Tracking läuft seit diesem Patch — ab jetzt wird jeder QR-Besuch gezählt.)</div>`;

  document.getElementById("replies").innerHTML =
    d.replies.recent.map(r => `<div class="row">
      <div class="main"><b>${esc(r.name)}</b>
        <span style="color:var(--muted)"> · ${esc(r.phone || r.email)} · ${esc((r.message || "").slice(0, 50))}</span></div>
      <div class="when">${fmtRel(r.created_at)}</div>
    </div>`).join("") ||
    `<div class="empty">Noch keine Antworten über das Formular.</div>`;

  document.getElementById("leadchips").innerHTML =
    Object.entries(d.leads.by_status)
      .map(([s, n]) => `<span class="chip">${esc(s)}: ${n}</span>`).join("");

  document.getElementById("updated").textContent =
    "Stand " + new Date().toLocaleTimeString("de-AT",
      { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("error").style.display = "none";
}

async function load() {
  try {
    const resp = await fetch("/api/status/summary", { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    render(await resp.json());
  } catch (e) {
    const el = document.getElementById("error");
    el.textContent = "Daten konnten nicht geladen werden: " + e.message;
    el.style.display = "block";
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
