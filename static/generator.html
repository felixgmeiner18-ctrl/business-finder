<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --panel: #111111;
  --border: #1e1e1e;
  --text: #f0f0f0;
  --muted: #777;
  --accent: #6366f1;
  --accent-h: #818cf8;
  --success: #22c55e;
  --radius: 8px;
}

html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* ── Layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.app-header {
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px; height: 52px;
  background: var(--panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.back-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: color .15s; white-space: nowrap; }
.back-btn:hover { color: var(--text); }
.hdr-div { width: 1px; height: 18px; background: var(--border); }
.hdr-name { font-size: 0.92rem; font-weight: 600; }
.hdr-cat { font-size: 0.78rem; color: var(--muted); margin-left: auto; }

.main-split { display: flex; flex: 1; overflow: hidden; }

/* ── Left panel ── */
.panel-left {
  width: 370px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--panel); border-right: 1px solid var(--border);
  overflow-y: auto;
}
.panel-left::-webkit-scrollbar { width: 3px; }
.panel-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Right panel ── */
.panel-right { flex: 1; background: #161616; position: relative; }
#preview { width: 100%; height: 100%; border: none; display: none; }
.preview-empty {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  color: var(--muted);
}
.preview-empty-icon { font-size: 2.8rem; opacity: 0.25; }
.preview-empty-text { font-size: 0.88rem; }

/* ── Sections ── */
.ctrl-sec { padding: 18px 20px; border-bottom: 1px solid var(--border); }
.ctrl-sec-title { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 13px; }

/* ── Buttons ── */
.gen-btn {
  width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.gen-btn:hover { background: var(--accent-h); }
.gen-btn:active { transform: scale(0.98); }
.gen-btn:disabled { opacity: .5; cursor: not-allowed; }

.regen-btn {
  padding: 5px 12px; background: transparent; border: 1px solid var(--border);
  border-radius: 5px; color: var(--muted); font-family: 'Inter', sans-serif;
  font-size: 0.75rem; cursor: pointer; transition: border-color .15s, color .15s;
}
.regen-btn:hover { border-color: var(--accent); color: var(--text); }

.export-btn {
  width: calc(100% - 40px); margin: 18px 20px; padding: 13px; background: var(--success); color: #fff;
  border: none; border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 0.9rem;
  font-weight: 600; cursor: pointer; transition: background .15s, transform .1s;
  display: none; align-items: center; justify-content: center; gap: 8px;
}
.export-btn.visible { display: flex; }
.export-btn:hover { background: #16a34a; }
.export-btn:active { transform: scale(0.98); }
.export-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── Spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.25); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }

/* ── Mood box ── */
.mood-box { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.mood-personality { font-size: 0.78rem; font-weight: 600; color: var(--accent-h); letter-spacing: .04em; margin-bottom: 5px; }
.mood-text { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

/* ── Font badges ── */
.font-pair { display: flex; gap: 10px; }
.font-badge { flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.font-badge-lbl { font-size: 0.62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 4px; }
.font-badge-name { font-size: 0.82rem; font-weight: 500; }

/* ── Color grid ── */
.color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.color-item { display: flex; flex-direction: column; gap: 5px; }
.color-lbl { font-size: 0.67rem; color: var(--muted); }
.color-swatch-wrap { position: relative; }
.color-swatch { width: 100%; height: 34px; border-radius: 5px; border: 1px solid rgba(255,255,255,.08); cursor: pointer; transition: transform .1s; }
.color-swatch:hover { transform: scale(1.04); }
.color-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

/* ── Form fields ── */
.ctrl-field { margin-bottom: 11px; }
.ctrl-lbl { display: block; font-size: 0.68rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .07em; }
.ctrl-input, .ctrl-ta {
  width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 0.83rem; padding: 8px 11px; outline: none; transition: border-color .15s; resize: vertical;
}
.ctrl-input:focus, .ctrl-ta:focus { border-color: var(--accent); }
.ctrl-ta { min-height: 72px; }

/* ── Service item ── */
.svc-item { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 6px; padding: 11px; margin-bottom: 8px; }
.svc-row { display: flex; gap: 8px; margin-bottom: 6px; }
.svc-icon-input {
  width: 46px; text-align: center; background: rgba(255,255,255,.08);
  border: 1px solid var(--border); border-radius: 5px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 1.15rem; padding: 5px; outline: none;
}

/* ── Controls hidden until generated ── */
#controls-area { display: none; }
#controls-area.visible { display: block; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="app-header">
    <a href="/" class="back-btn">← Dashboard</a>
    <div class="hdr-div"></div>
    <span class="hdr-name" id="hdrName">Lädt…</span>
    <span class="hdr-cat" id="hdrCat"></span>
  </header>

  <div class="main-split">

    <!-- Left: Controls -->
    <div class="panel-left">

      <!-- Generate -->
      <div class="ctrl-sec">
        <div class="ctrl-sec-title">Design generieren</div>
        <button class="gen-btn" id="genBtn" onclick="generateDesign()">
          <div class="spinner" id="genSpinner"></div>
          <span id="genBtnText">✨ Design generieren</span>
        </button>
      </div>

      <!-- Dynamic controls -->
      <div id="controls-area">

        <!-- Personality / mood -->
        <div class="ctrl-sec">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;">
            <div class="ctrl-sec-title" style="margin-bottom:0;">Persönlichkeit</div>
            <button class="regen-btn" onclick="generateDesign()">Neu ↺</button>
          </div>
          <div class="mood-box">
            <div class="mood-personality" id="ctrlPersonality"></div>
            <div class="mood-text" id="ctrlMood"></div>
          </div>
        </div>

        <!-- Colors -->
        <div class="ctrl-sec">
          <div class="ctrl-sec-title">Farben</div>
          <div class="color-grid" id="colorGrid"></div>
        </div>

        <!-- Fonts -->
        <div class="ctrl-sec">
          <div class="ctrl-sec-title">Typografie</div>
          <div class="font-pair" id="fontPair"></div>
        </div>

        <!-- Design Tokens -->
        <div class="ctrl-sec" id="designTokenSec" style="display:none;">
          <div class="ctrl-sec-title">Design-Token</div>
          <div class="font-pair">
            <div class="font-badge"><div class="font-badge-lbl">Eckenradius</div><div class="font-badge-name" id="dtRadius">—</div></div>
            <div class="font-badge"><div class="font-badge-lbl">Button-Stil</div><div class="font-badge-name" id="dtButton">—</div></div>
          </div>
        </div>

        <!-- Copy -->
        <div class="ctrl-sec">
          <div class="ctrl-sec-title">Texte</div>
          <div class="ctrl-field">
            <label class="ctrl-lbl">Headline</label>
            <input class="ctrl-input" id="copyHeadline" type="text" oninput="scheduleRender()">
          </div>
          <div class="ctrl-field">
            <label class="ctrl-lbl">Tagline</label>
            <input class="ctrl-input" id="copyTagline" type="text" oninput="scheduleRender()">
          </div>
          <div class="ctrl-field">
            <label class="ctrl-lbl">Über uns</label>
            <textarea class="ctrl-ta" id="copyAbout" oninput="scheduleRender()"></textarea>
          </div>
          <div class="ctrl-field">
            <label class="ctrl-lbl">CTA-Button</label>
            <input class="ctrl-input" id="copyCta" type="text" oninput="scheduleRender()">
          </div>
        </div>

        <!-- Services -->
        <div class="ctrl-sec">
          <div class="ctrl-sec-title">Leistungen</div>
          <div id="svcsEditor"></div>
        </div>

      </div>
      <!-- /controls-area -->

      <!-- Export -->
      <button class="export-btn" id="exportBtn" onclick="exportSite()">
        ⬇ Als ZIP exportieren
      </button>

    </div>
    <!-- /panel-left -->

    <!-- Right: Preview iframe -->
    <div class="panel-right">
      <div class="preview-empty" id="previewEmpty">
        <div class="preview-empty-icon">🌐</div>
        <div class="preview-empty-text">Klicke auf „Design generieren" um zu starten</div>
      </div>
      <iframe id="preview"></iframe>
    </div>

  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let currentSpec = null;
let renderTimer = null;
const params = new URLSearchParams(location.search);
const businessId = params.get('id');

// ─── Utilities ────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    if (currentSpec) { currentSpec = collectSpec(); renderPreview(currentSpec); }
  }, 200);
}

function adjustColor(hex, amt) {
  try {
    const n = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, Math.max(0, (n >> 16) + amt));
    const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amt));
    const b = Math.min(255, Math.max(0, (n & 0xff) + amt));
    return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
  } catch(e) { return hex; }
}

// ─── Load business info ───────────────────────────────────────────────────────
async function loadBizInfo() {
  if (!businessId) return;
  try {
    const all = await fetch('/businesses').then(r => r.json());
    const biz = all.find(b => b.id == businessId);
    if (biz) {
      document.getElementById('hdrName').textContent = biz.name;
      document.getElementById('hdrCat').textContent = biz.category || '';
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════════════════
// COMPONENT TEMPLATES
// Each function(copy, colors, fonts) → HTML string
// ═══════════════════════════════════════════════════════════════════════════════

// ── NAV ───────────────────────────────────────────────────────────────────────
function navHtml(copy, c, f) {
  const svcs = copy.services || [];
  return `<nav class="nav">
  <span class="nav__brand">${esc(copy.business_name)}</span>
  <div class="nav__links">
    ${svcs.length ? `<a href="#services" class="nav__link">Leistungen</a>` : ''}
    <a href="#about" class="nav__link">Über uns</a>
    <a href="#contact" class="nav__link nav__link--cta">${esc(copy.cta || 'Kontakt')}</a>
  </div>
</nav>`;
}

// ── HERO: full-bleed-atmospheric ──────────────────────────────────────────────
function heroAtmospheric(copy, c, f) {
  return `<section id="hero" class="hero hero--atmospheric">
  <div class="hero__bg-glow"></div>
  <div class="hero__bg-texture"></div>
  <div class="hero__blob hero__blob--1" aria-hidden="true"></div>
  <div class="hero__blob hero__blob--2" aria-hidden="true"></div>
  <div class="hero__inner">
    <p class="hero__tagline reveal">${esc(copy.tagline)}</p>
    <h1 class="hero__headline reveal reveal--delay-1">${esc(copy.headline)}</h1>
    <div class="hero__actions reveal reveal--delay-2">
      <a href="#contact" class="btn-primary">${esc(copy.cta || 'Kontakt aufnehmen')}</a>
      <a href="#services" class="btn-secondary">Unsere Leistungen</a>
    </div>
  </div>
</section>`;
}

// ── HERO: split-cinematic ─────────────────────────────────────────────────────
function heroCinematic(copy, c, f) {
  return `<section id="hero" class="hero hero--cinematic">
  <div class="hero__panel-left">
    <div class="hero__panel-left-inner">
      <div class="hero__divider"></div>
      <p class="hero__brand-name">${esc(copy.business_name)}</p>
      <div class="hero__divider"></div>
    </div>
  </div>
  <div class="hero__panel-right">
    <div>
      <p class="hero__tagline reveal">${esc(copy.tagline)}</p>
      <h1 class="hero__headline reveal reveal--delay-1">${esc(copy.headline)}</h1>
      <a href="#contact" class="btn-primary reveal reveal--delay-2">${esc(copy.cta || 'Jetzt anfragen')}</a>
    </div>
  </div>
</section>`;
}

// ── HERO: minimal-centered ────────────────────────────────────────────────────
function heroMinimal(copy, c, f) {
  return `<section id="hero" class="hero hero--minimal">
  <div class="hero__blob hero__blob--1" aria-hidden="true"></div>
  <div class="hero__blob hero__blob--2" aria-hidden="true"></div>
  <div class="hero__inner">
    <p class="hero__eyebrow reveal">${esc(copy.business_name)}</p>
    <h1 class="hero__headline reveal reveal--delay-1">${esc(copy.headline)}</h1>
    <div class="hero__divider reveal reveal--delay-2"></div>
    <p class="hero__tagline reveal reveal--delay-2">${esc(copy.tagline)}</p>
    <a href="#contact" class="btn-primary reveal reveal--delay-3">${esc(copy.cta || 'Kontakt aufnehmen')}</a>
  </div>
</section>`;
}

// ── SERVICES: card-grid ───────────────────────────────────────────────────────
function servicesCardGrid(copy, c, f) {
  const svcs = copy.services || [];
  const cards = svcs.map((s, i) => `
    <div class="card reveal reveal--delay-${i + 1}">
      <div class="card__icon">${esc(s.icon || '✦')}</div>
      <h3 class="card__title">${esc(s.name)}</h3>
      <p class="card__desc">${esc(s.description)}</p>
    </div>`).join('');
  return `<section id="services" class="services services--card-grid">
  <div class="container">
    <div class="services__header">
      <p class="section-eyebrow reveal">Was wir anbieten</p>
      <h2 class="section-title reveal reveal--delay-1">Unsere Leistungen</h2>
    </div>
    <div class="services__grid">${cards}</div>
  </div>
</section>`;
}

// ── SERVICES: icon-columns ────────────────────────────────────────────────────
function servicesIconCols(copy, c, f) {
  const svcs = copy.services || [];
  const cols = svcs.map((s, i) => `
    <div class="icon-col reveal reveal--delay-${i + 1}">
      <div class="icon-col__bubble">${esc(s.icon || '✦')}</div>
      <h3 class="icon-col__title">${esc(s.name)}</h3>
      <p class="icon-col__desc">${esc(s.description)}</p>
    </div>`).join('');
  return `<section id="services" class="services services--icon-cols">
  <div class="container">
    <div class="services__header">
      <p class="section-eyebrow reveal">Was wir anbieten</p>
      <h2 class="section-title reveal reveal--delay-1">Unsere Leistungen</h2>
      <div class="section-divider" style="margin:16px auto 64px;"></div>
    </div>
    <div class="services__cols">${cols}</div>
  </div>
</section>`;
}

// ── SERVICES: horizontal-feature ─────────────────────────────────────────────
function servicesHorizontal(copy, c, f) {
  const svcs = copy.services || [];
  const rows = svcs.map((s, i) => `
    <div class="feat-row reveal reveal--delay-${i}">
      <div class="feat-row__icon-box">${esc(s.icon || '✦')}</div>
      <div class="feat-row__body">
        <h3 class="feat-row__title">${esc(s.name)}</h3>
        <p class="feat-row__desc">${esc(s.description)}</p>
      </div>
    </div>`).join('');
  return `<section id="services" class="services services--horizontal">
  <div class="container" style="max-width:860px;">
    <div class="services__header">
      <p class="section-eyebrow reveal">Was wir anbieten</p>
      <h2 class="section-title reveal reveal--delay-1">Unsere Leistungen</h2>
    </div>
    ${rows}
  </div>
</section>`;
}

// ── ABOUT: split-portrait-story ───────────────────────────────────────────────
function aboutSplit(copy, c, f) {
  const initials = (copy.business_name || 'AB').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  return `<section id="about" class="about about--split">
  <div class="about__grid">
    <div class="about__portrait reveal">
      <div class="about__portrait-texture"></div>
      <span class="about__initials">${esc(initials)}</span>
    </div>
    <div>
      <p class="about__eyebrow reveal">Über uns</p>
      <h2 class="about__heading reveal reveal--delay-1">Qualität ist keine Option — sie ist unser Versprechen</h2>
      <p class="about__body reveal reveal--delay-2">${esc(copy.about)}</p>
      <a href="#contact" class="btn-primary reveal reveal--delay-3">${esc(copy.cta || 'Kontakt aufnehmen')}</a>
    </div>
  </div>
</section>`;
}

// ── ABOUT: centered-founder ───────────────────────────────────────────────────
function aboutCentered(copy, c, f) {
  return `<section id="about" class="about about--centered">
  <div style="max-width:780px;margin:0 auto;">
    <p class="about__eyebrow reveal" style="margin-bottom:44px;">Über uns</p>
    <div class="about__quote-mark reveal">"</div>
    <p class="about__quote-text reveal reveal--delay-1">${esc(copy.about)}</p>
    <div class="about__attr-line reveal reveal--delay-2"></div>
    <p class="about__attr-name reveal reveal--delay-2">${esc(copy.business_name)}</p>
  </div>
</section>`;
}

// ── ABOUT: full-text-elegant ──────────────────────────────────────────────────
function aboutElegant(copy, c, f) {
  const first = (copy.about || 'W')[0];
  const rest = (copy.about || '').slice(1);
  return `<section id="about" class="about about--elegant">
  <div style="max-width:740px;margin:0 auto;">
    <p class="about__eyebrow reveal">Über uns</p>
    <h2 class="about__heading reveal reveal--delay-1">Wer wir sind</h2>
    <p class="about__prose reveal reveal--delay-2">
      <span class="about__drop-cap">${esc(first)}</span>${esc(rest)}
    </p>
  </div>
</section>`;
}

// ── CONTACT: phone-prominent ──────────────────────────────────────────────────
function contactPhone(copy, c, f) {
  return `<section id="contact" class="contact contact--phone">
  <div class="contact__inner">
    <p class="contact__eyebrow reveal">Kontakt</p>
    <h2 class="contact__heading reveal reveal--delay-1">Nehmen Sie Kontakt auf</h2>
    <a href="tel:${esc(copy.phone || '')}" class="contact__phone-number reveal reveal--delay-2">${esc(copy.phone || '+49 000 000000')}</a>
    ${copy.address ? `<p class="contact__address reveal reveal--delay-3">${esc(copy.address)}</p>` : '<div style="margin-bottom:64px;"></div>'}
    <p class="contact__divider-text reveal">— oder senden Sie uns eine Nachricht —</p>
    <form class="form form--dark reveal reveal--delay-1" style="max-width:460px;margin:0 auto;" onsubmit="return false;">
      <input class="form__input" placeholder="Ihr Name" />
      <input class="form__input" placeholder="Ihre E-Mail" />
      <textarea class="form__textarea" placeholder="Ihre Nachricht" rows="4"></textarea>
      <button type="submit" class="btn-primary form__submit">${esc(copy.cta || 'Nachricht senden')}</button>
    </form>
  </div>
</section>`;
}

// ── CONTACT: minimal-form ─────────────────────────────────────────────────────
function contactForm(copy, c, f) {
  return `<section id="contact" class="contact contact--form">
  <div style="max-width:640px;margin:0 auto;">
    <p class="contact__eyebrow reveal">Kontakt</p>
    <h2 class="contact__heading reveal reveal--delay-1">Schreiben Sie uns</h2>
    <form class="form form--underline reveal reveal--delay-2" onsubmit="return false;">
      <div class="form__row">
        <input class="form__input" placeholder="Name" />
        <input class="form__input" placeholder="E-Mail" />
      </div>
      <textarea class="form__textarea" placeholder="Ihre Nachricht…" rows="5"></textarea>
      <button type="submit" class="btn-primary form__submit">${esc(copy.cta || 'Absenden')}</button>
    </form>
    <div class="contact__info-footer reveal">
      <p class="contact__info-line">📞 <a href="tel:${esc(copy.phone || '')}">${esc(copy.phone || '')}</a></p>
      ${copy.address ? `<p class="contact__info-line">📍 ${esc(copy.address)}</p>` : ''}
    </div>
  </div>
</section>`;
}

// ── CONTACT: split-with-info ──────────────────────────────────────────────────
function contactSplit(copy, c, f) {
  return `<section id="contact" class="contact contact--split">
  <div class="contact__split-grid">
    <div>
      <p class="contact__eyebrow reveal">Kontakt</p>
      <h2 class="contact__heading reveal reveal--delay-1" style="font-size:clamp(1.8rem,3vw,2.9rem);">Sprechen Sie uns an</h2>
      <form class="form form--light reveal reveal--delay-2" onsubmit="return false;">
        <input class="form__input" placeholder="Ihr Name" />
        <input class="form__input" placeholder="E-Mail" />

@keyframes wordUp{from{transform:translateY(110%);opacity:0}to{transform:translateY(0);opacity:1}}
.word-wrap{display:inline-block;overflow:hidden;vertical-align:top;line-height:inherit}
.word-inner{display:inline-block;animation:wordUp .9s cubic-bezier(.16,1,.3,1) both;will-change:transform}
/* Responsive */
@media(max-width:900px){
  .hero--cinematic{grid-template-columns:1fr}
  .hero__panel-left{min-height:45vh}
  .about__grid{grid-template-columns:1fr;gap:48px}
  .about__portrait{aspect-ratio:16/9}
  .contact__split-grid{grid-template-columns:1fr;gap:56px}
  .services__cols{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .nav__links{display:none}
  .hero__actions{flex-direction:column;align-items:center}
  .form__row{grid-template-columns:1fr}
  .services__cols{grid-template-columns:1fr}
  .feat-row{flex-direction:column;gap:20px}
}`;

  const sectionHtml = (sections || ['hero','services','about','contact']).map(s => {
    const v = (layout || {})[s];
    if (s === 'hero')     return (HERO[v]     || heroAtmospheric)(copy, c, f);
    if (s === 'services') return (SERVICES[v] || servicesCardGrid)(copy, c, f);
    if (s === 'about')    return (ABOUT[v]    || aboutSplit)(copy, c, f);
    if (s === 'contact')  return (CONTACT[v]  || contactPhone)(copy, c, f);
    return '';
  }).join('\n');

  return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(seo.meta_title || copy.business_name)}</title>
<meta name="description" content="${esc(seo.meta_description || '')}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="${gfonts}" rel="stylesheet">
<style>
${generatedCSS}
</style>
</head>
<body>
${navHtml(copy, c, f)}
${sectionHtml}
${footerHtml(copy, c, f)}
<script>
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    const el=document.querySelector(a.getAttribute('href'));
    if(el)el.scrollIntoView({behavior:'smooth'});
  });
});
const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){e.target.classList.add('revealed');io.unobserve(e.target);}
  });
},{threshold:0.15});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
/* Hero headline word-split */
(function(){
  const h=document.querySelector('.hero__headline');
  if(!h)return;
  const words=h.textContent.trim().split(/\s+/);
  h.innerHTML=words.map((w,i)=>\`<span class="word-wrap"><span class="word-inner" style="animation-delay:\${0.2+i*0.12}s">\${w}</span></span>\`).join(' ');
})();
<\/script>
</body>
</html>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════════════════════
function renderPreview(spec) {
  document.getElementById('previewEmpty').style.display = 'none';
  const iframe = document.getElementById('preview');
  iframe.style.display = 'block';
  iframe.srcdoc = buildPreviewHtml(spec);
}

function renderControls(spec) {
  // Mood
  document.getElementById('ctrlPersonality').textContent = spec.personality || '';
  document.getElementById('ctrlMood').textContent = spec.mood || '';

  // Colors
  const colorDefs = [
    { key: 'primary', lbl: 'Primär' },
    { key: 'accent', lbl: 'Akzent' },
    { key: 'background', lbl: 'Hintergrund' },
    { key: 'surface', lbl: 'Fläche' },
    { key: 'text', lbl: 'Text' },
    { key: 'text_muted', lbl: 'Text Hell' },
  ];
  document.getElementById('colorGrid').innerHTML = colorDefs.map(cd => `
    <div class="color-item">
      <span class="color-lbl">${cd.lbl}</span>
      <div class="color-swatch-wrap">
        <div class="color-swatch" id="sw-${cd.key}" style="background:${spec.colors[cd.key]||'#888'}"></div>
        <input type="color" class="color-input" data-key="${cd.key}" value="${spec.colors[cd.key]||'#888888'}" oninput="onColor('${cd.key}',this.value)">
      </div>
    </div>`).join('');

  // Fonts
  document.getElementById('fontPair').innerHTML = `
    <div class="font-badge"><div class="font-badge-lbl">Überschrift</div><div class="font-badge-name">${esc(spec.fonts.heading)}</div></div>
    <div class="font-badge"><div class="font-badge-lbl">Fließtext</div><div class="font-badge-name">${esc(spec.fonts.body)}</div></div>`;

  // Design Tokens
  if (spec.design_tokens) {
    document.getElementById('designTokenSec').style.display = 'block';
    document.getElementById('dtRadius').textContent = spec.design_tokens.border_radius || '—';
    document.getElementById('dtButton').textContent  = spec.design_tokens.button_style  || '—';
  }

  // Copy
  document.getElementById('copyHeadline').value = spec.copy.headline || '';
  document.getElementById('copyTagline').value  = spec.copy.tagline  || '';
  document.getElementById('copyAbout').value    = spec.copy.about    || '';
  document.getElementById('copyCta').value      = spec.copy.cta      || '';

  // Services
  const svcs = spec.copy.services || [];
  document.getElementById('svcsEditor').innerHTML = svcs.map((s, i) => `
    <div class="svc-item">
      <div class="svc-row">
        <input class="svc-icon-input" type="text" value="${esc(s.icon||'✦')}" maxlength="2" oninput="onSvc(${i},'icon',this.value)">
        <input class="ctrl-input" style="flex:1" type="text" value="${esc(s.name)}" placeholder="Leistungsname" oninput="onSvc(${i},'name',this.value)">
      </div>
      <textarea class="ctrl-ta" style="min-height:56px;" placeholder="Beschreibung" oninput="onSvc(${i},'description',this.value)">${esc(s.description)}</textarea>
    </div>`).join('');

  document.getElementById('controls-area').classList.add('visible');
  document.getElementById('exportBtn').classList.add('visible');
}

function collectSpec() {
  if (!currentSpec) return null;
  const s = JSON.parse(JSON.stringify(currentSpec));
  document.querySelectorAll('[data-key]').forEach(inp => { s.colors[inp.dataset.key] = inp.value; });
  s.copy.headline = document.getElementById('copyHeadline').value;
  s.copy.tagline  = document.getElementById('copyTagline').value;
  s.copy.about    = document.getElementById('copyAbout').value;
  s.copy.cta      = document.getElementById('copyCta').value;
  s.copy.services = Array.from(document.querySelectorAll('.svc-item')).map(item => {
    const ins = item.querySelectorAll('input, textarea');
    return { icon: ins[0]?.value||'✦', name: ins[1]?.value||'', description: ins[2]?.value||'' };
  });
  return s;
}

function onColor(key, val) {
  if (!currentSpec) return;
  currentSpec.colors[key] = val;
  const sw = document.getElementById('sw-' + key);
  if (sw) sw.style.background = val;
  scheduleRender();
}

function onSvc(idx, field, val) {
  if (!currentSpec?.copy?.services?.[idx]) return;
  currentSpec.copy.services[idx][field] = val;
  scheduleRender();
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function generateDesign() {
  const btn = document.getElementById('genBtn');
  const spinner = document.getElementById('genSpinner');
  const btnText = document.getElementById('genBtnText');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Generiere Design…';

  try {
    const resp = await fetch('/api/generator/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ business_id: parseInt(businessId) }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `Fehler ${resp.status}`);
    }
    currentSpec = await resp.json();
    renderControls(currentSpec);
    renderPreview(currentSpec);
    btnText.textContent = '✨ Erneut generieren';
  } catch(e) {
    alert('Fehler: ' + e.message);
    btnText.textContent = '✨ Design generieren';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

// ── Export ────────────────────────────────────────────────────────────────────
async function exportSite() {
  const btn = document.getElementById('exportBtn');
  const spec = collectSpec();
  if (!spec) return;
  btn.disabled = true;
  btn.textContent = '⏳ Erstelle ZIP…';
  try {
    const resp = await fetch('/api/generator/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        business_id: parseInt(businessId),
        html: buildPreviewHtml(spec),
        theme: spec.theme || 'custom',
        sections: spec.sections || [],
      }),
    });
    if (!resp.ok) throw new Error(`Fehler ${resp.status}`);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `website-${(spec.copy.business_name||'export').replace(/\s+/g,'-').toLowerCase()}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.textContent = '✅ ZIP heruntergeladen!';
    setTimeout(() => { btn.textContent = '⬇ Als ZIP exportieren'; btn.disabled = false; }, 3000);
  } catch(e) {
    alert('Export fehlgeschlagen: ' + e.message);
    btn.textContent = '⬇ Als ZIP exportieren';
    btn.disabled = false;
  }
}
