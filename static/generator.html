<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --panel: #111111;
  --border: #1e1e1e;
  --text: #f0f0f0;
  --muted: #777;
  --accent: #6366f1;
  --accent-h: #818cf8;
  --success: #22c55e;
  --radius: 8px;
}

html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* ── Layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.app-header {
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px; height: 52px;
  background: var(--panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.back-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: color .15s; white-space: nowrap; }
.back-btn:hover { color: var(--text); }
.hdr-div { width: 1px; height: 18px; background: var(--border); }
.hdr-name { font-size: 0.92rem; font-weight: 600; }
.hdr-cat { font-size: 0.78rem; color: var(--muted); margin-left: auto; }

.main-split { display: flex; flex: 1; overflow: hidden; }

/* ── Left panel ── */
.panel-left {
  width: 370px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--panel); border-right: 1px solid var(--border);
  overflow-y: auto;
}
.panel-left::-webkit-scrollbar { width: 3px; }
.panel-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Right panel ── */
.panel-right { flex: 1; background: #161616; position: relative; }
#preview { width: 100%; height: 100%; border: none; display: none; }
.preview-empty {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  color: var(--muted);
}
.preview-empty-icon { font-size: 2.8rem; opacity: 0.25; }
.preview-empty-text { font-size: 0.88rem; }

/* ── Sections ── */
.ctrl-sec { padding: 18px 20px; border-bottom: 1px solid var(--border); }
.ctrl-sec-title { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 13px; }

/* ── Buttons ── */
.gen-btn {
  width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.gen-btn:hover { background: var(--accent-h); }
.gen-btn:active { transform: scale(0.98); }
.gen-btn:disabled { opacity: .5; cursor: not-allowed; }

.regen-btn {
  padding: 5px 12px; background: transparent; border: 1px solid var(--border);
  border-radius: 5px; color: var(--muted); font-family: 'Inter', sans-serif;
  font-size: 0.75rem; cursor: pointer; transition: border-color .15s, color .15s;
}
.regen-btn:hover { border-color: var(--accent); color: var(--text); }

.export-btn {
  width: calc(100% - 40px); margin: 18px 20px; padding: 13px; background: var(--success); color: #fff;
  border: none; border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 0.9rem;
  font-weight: 600; cursor: pointer; transition: background .15s, transform .1s;
  display: none; align-items: center; justify-content: center; gap: 8px;
}
.export-btn.visible { display: flex; }
.export-btn:hover { background: #16a34a; }
.export-btn:active { transform: scale(0.98); }
.export-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── Spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.25); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }

/* ── Mood box ── */
.mood-box { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.mood-personality { font-size: 0.78rem; font-weight: 600; color: var(--accent-h); letter-spacing: .04em; margin-bottom: 5px; }
.mood-text { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

/* ── Font badges ── */
.font-pair { display: flex; gap: 10px; }
.font-badge { flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.font-badge-lbl { font-size: 0.62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 4px; }
.font-badge-name { font-size: 0.82rem; font-weight: 500; }

/* ── Color grid ── */
.color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.color-item { display: flex; flex-direction: column; gap: 5px; }
.color-lbl { font-size: 0.67rem; color: var(--muted); }
.color-swatch-wrap { position: relative; }
.color-swatch { width: 100%; height: 34px; border-radius: 5px; border: 1px solid rgba(255,255,255,.08); cursor: pointer; transition: transform .1s; }
.color-swatch:hover { transform: scale(1.04); }
.color-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

/* ── Form fields ── */
.ctrl-field { margin-bottom: 11px; }
.ctrl-lbl { display: block; font-size: 0.68rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .07em; }
.ctrl-input, .ctrl-ta {
  width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 0.83rem; padding: 8px 11px; outline: none; transition: border-color .15s; resize: vertical;
}
.ctrl-input:focus, .ctrl-ta:focus { border-color: var(--accent); }
.ctrl-ta { min-height: 72px; }

/* ── Service item ── */
.svc-item { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 6px; padding: 11px; margin-bottom: 8px; }
.svc-row { display: flex; gap: 8px; margin-bottom: 6px; }
.svc-icon-input {
  width: 46px; text-align: center; background: rgba(255,255,255,.08);
  border: 1px solid var(--border); border-radius: 5px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 1.15rem; padding: 5px; outline: none;
}

/* ── Controls hidden until generated ── */
#controls-area { display: none; }
#controls-area.visible { display: block; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="app-header">
    <a href="/" class="back-btn">← Dashboard</a>
    <div class="hdr-div"></div>
    <span class="hdr-name" id="hdrName">Lädt…</span>
    <span class="hdr-cat" id="hdrCat"></span>
  </header>

  <div class="main-split">

    <!-- Left: Controls -->
    <div class="panel-left">

      <!-- Generate -->
      <div class="ctrl-sec">
        <div class="ctrl-sec-title">Design generieren</div>
        <button class="gen-btn" id="genBtn" onclick="generateDesign()">
          <div class="spinner" id="genSpinner"></div>
          <span id="genBtnText">✨ Design generieren</span>
        </button>
      </div>

      <!-- Dynamic controls -->
      <div id="controls-area">

        <!-- Personality / mood -->
        <div class="ctrl-sec">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;">
            <div class="ctrl-sec-title" style="margin-bottom:0;">Persönlichkeit</div>
            <button class="regen-btn" onclick="generateDesign()">Neu ↺</button>
          </div>
          <div class="mood-box">
            <div class="mood-personality" id="ctrlPersonality"></div>
            <div class="mood-text" id="ctrlMood"></div>
          </div>
        </div>

        <!-- Colors -->
        <div class="ctrl-sec">
          <div class="ctrl-sec-title">Farben</div>
          <div class="color-grid" id="colorGrid"></div>
        </div>

        <!-- Fonts -->
        <div class="ctrl-sec">
          <div class="ctrl-sec-title">Typografie</div>
          <div class="font-pair" id="fontPair"></div>
        </div>

        <!-- Copy -->
        <div class="ctrl-sec">
          <div class="ctrl-sec-title">Texte</div>
          <div class="ctrl-field">
            <label class="ctrl-lbl">Headline</label>
            <input class="ctrl-input" id="copyHeadline" type="text" oninput="scheduleRender()">
          </div>
          <div class="ctrl-field">
            <label class="ctrl-lbl">Tagline</label>
            <input class="ctrl-input" id="copyTagline" type="text" oninput="scheduleRender()">
          </div>
          <div class="ctrl-field">
            <label class="ctrl-lbl">Über uns</label>
            <textarea class="ctrl-ta" id="copyAbout" oninput="scheduleRender()"></textarea>
          </div>
          <div class="ctrl-field">
            <label class="ctrl-lbl">CTA-Button</label>
            <input class="ctrl-input" id="copyCta" type="text" oninput="scheduleRender()">
          </div>
        </div>

        <!-- Services -->
        <div class="ctrl-sec">
          <div class="ctrl-sec-title">Leistungen</div>
          <div id="svcsEditor"></div>
        </div>

      </div>
      <!-- /controls-area -->

      <!-- Export -->
      <button class="export-btn" id="exportBtn" onclick="exportSite()">
        ⬇ Als ZIP exportieren
      </button>

    </div>
    <!-- /panel-left -->

    <!-- Right: Preview iframe -->
    <div class="panel-right">
      <div class="preview-empty" id="previewEmpty">
        <div class="preview-empty-icon">🌐</div>
        <div class="preview-empty-text">Klicke auf „Design generieren" um zu starten</div>
      </div>
      <iframe id="preview"></iframe>
    </div>

  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let currentSpec = null;
let renderTimer = null;
const params = new URLSearchParams(location.search);
const businessId = params.get('id');

// ─── Utilities ────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    if (currentSpec) { currentSpec = collectSpec(); renderPreview(currentSpec); }
  }, 200);
}

function adjustColor(hex, amt) {
  try {
    const n = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, Math.max(0, (n >> 16) + amt));
    const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amt));
    const b = Math.min(255, Math.max(0, (n & 0xff) + amt));
    return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
  } catch(e) { return hex; }
}

// ─── Load business info ───────────────────────────────────────────────────────
async function loadBizInfo() {
  if (!businessId) return;
  try {
    const all = await fetch('/businesses').then(r => r.json());
    const biz = all.find(b => b.id == businessId);
    if (biz) {
      document.getElementById('hdrName').textContent = biz.name;
      document.getElementById('hdrCat').textContent = biz.category || '';
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════════════════
// COMPONENT TEMPLATES
// Each function(copy, colors, fonts) → HTML string
// ═══════════════════════════════════════════════════════════════════════════════

// ── NAV ───────────────────────────────────────────────────────────────────────
function navHtml(copy, c, f) {
  const svcs = copy.services || [];
  return `<nav style="position:fixed;top:0;left:0;right:0;z-index:1000;background:${c.primary}f2;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);height:66px;padding:0 6%;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07);">
  <span style="font-family:'${f.heading}',Georgia,serif;font-size:1.2rem;font-weight:700;color:#fff;letter-spacing:0.01em;">${esc(copy.business_name)}</span>
  <div style="display:flex;gap:28px;align-items:center;">
    ${svcs.length ? `<a href="#services" style="font-family:'${f.body}',sans-serif;font-size:0.82rem;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.7);text-decoration:none;">Leistungen</a>` : ''}
    <a href="#about" style="font-family:'${f.body}',sans-serif;font-size:0.82rem;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.7);text-decoration:none;">Über uns</a>
    <a href="#contact" style="font-family:'${f.body}',sans-serif;font-size:0.82rem;font-weight:600;color:#fff;text-decoration:none;padding:10px 22px;background:${c.accent};border-radius:4px;letter-spacing:0.04em;">${esc(copy.cta||'Kontakt')}</a>
  </div>
</nav>`;
}

// ── HERO: full-bleed-atmospheric ──────────────────────────────────────────────
function heroAtmospheric(copy, c, f) {
  return `<section id="hero" style="min-height:100vh;background:linear-gradient(145deg,${c.primary} 0%,${adjustColor(c.primary,-25)} 55%,${adjustColor(c.primary,-40)} 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 6% 90px;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 25% 60%,${c.accent}28 0%,transparent 55%),radial-gradient(ellipse at 75% 20%,${c.accent}18 0%,transparent 50%);"></div>
  <div style="position:absolute;inset:0;opacity:0.04;background-image:url('data:image/svg+xml,%3Csvg width=\\'52\\' height=\\'52\\' viewBox=\\'0 0 52 52\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cg fill=\\'none\\' stroke=\\'%23ffffff\\' stroke-width=\\'0.5\\'%3E%3Cpath d=\\'M26 2L50 26L26 50L2 26Z\\'/%3E%3C/g%3E%3C/svg%3E');"></div>
  <div style="position:relative;z-index:1;max-width:880px;">
    <p style="font-family:'${f.body}',sans-serif;font-size:0.78rem;letter-spacing:0.28em;text-transform:uppercase;color:${c.accent};margin-bottom:30px;font-weight:500;">${esc(copy.tagline)}</p>
    <h1 style="font-family:'${f.heading}',Georgia,serif;font-size:clamp(2.8rem,7vw,5.8rem);font-weight:900;color:#fff;line-height:1.06;margin-bottom:40px;letter-spacing:-0.025em;">${esc(copy.headline)}</h1>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
      <a href="#contact" style="display:inline-flex;align-items:center;padding:16px 42px;background:${c.accent};color:#fff;font-family:'${f.body}',sans-serif;font-weight:600;font-size:0.95rem;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;">${esc(copy.cta||'Kontakt aufnehmen')}</a>
      <a href="#services" style="display:inline-flex;align-items:center;padding:16px 42px;background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;font-family:'${f.body}',sans-serif;font-weight:500;font-size:0.95rem;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;">Unsere Leistungen</a>
    </div>
  </div>
</section>`;
}

// ── HERO: split-cinematic ─────────────────────────────────────────────────────
function heroCinematic(copy, c, f) {
  return `<section id="hero" style="min-height:100vh;display:grid;grid-template-columns:1fr 1fr;">
  <div style="background:linear-gradient(160deg,${c.primary} 0%,${adjustColor(c.primary,-35)} 100%);display:flex;align-items:center;justify-content:center;padding:90px 56px;position:relative;overflow:hidden;">
    <div style="position:absolute;inset:0;opacity:0.06;background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);background-size:20px 20px;"></div>
    <div style="position:relative;text-align:center;">
      <div style="width:64px;height:2px;background:${c.accent};margin:0 auto 36px;"></div>
      <p style="font-family:'${f.heading}',Georgia,serif;font-size:clamp(2rem,3.5vw,3.2rem);font-weight:700;color:#fff;line-height:1.18;letter-spacing:0.01em;">${esc(copy.business_name)}</p>
      <div style="width:64px;height:2px;background:${c.accent};margin:36px auto 0;"></div>
    </div>
  </div>
  <div style="background:${c.background};display:flex;align-items:center;padding:90px 56px;">
    <div>
      <p style="font-family:'${f.body}',sans-serif;font-size:0.75rem;letter-spacing:0.22em;text-transform:uppercase;color:${c.accent};margin-bottom:18px;font-weight:500;">${esc(copy.tagline)}</p>
      <h1 style="font-family:'${f.heading}',Georgia,serif;font-size:clamp(2.2rem,4vw,4rem);font-weight:900;color:${c.text};line-height:1.08;margin-bottom:36px;letter-spacing:-0.025em;">${esc(copy.headline)}</h1>
      <a href="#contact" style="display:inline-block;padding:15px 38px;background:${c.primary};color:#fff;font-family:'${f.body}',sans-serif;font-weight:600;font-size:0.9rem;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;">${esc(copy.cta||'Jetzt anfragen')}</a>
    </div>
  </div>
</section>`;
}

// ── HERO: minimal-centered ────────────────────────────────────────────────────
function heroMinimal(copy, c, f) {
  return `<section id="hero" style="min-height:100vh;background:${c.background};display:flex;align-items:center;justify-content:center;padding:120px 6% 80px;text-align:center;">
  <div style="max-width:940px;">
    <p style="font-family:'${f.body}',sans-serif;font-size:0.75rem;letter-spacing:0.32em;text-transform:uppercase;color:${c.text_muted};margin-bottom:52px;">${esc(copy.business_name)}</p>
    <h1 style="font-family:'${f.heading}',Georgia,serif;font-size:clamp(3.2rem,9vw,8rem);font-weight:900;color:${c.text};line-height:0.95;letter-spacing:-0.04em;margin-bottom:20px;">${esc(copy.headline)}</h1>
    <div style="width:56px;height:3px;background:${c.accent};margin:36px auto;"></div>
    <p style="font-family:'${f.body}',sans-serif;font-size:1.1rem;color:${c.text_muted};margin-bottom:52px;line-height:1.65;max-width:560px;margin-left:auto;margin-right:auto;">${esc(copy.tagline)}</p>
    <a href="#contact" style="display:inline-block;padding:17px 52px;background:${c.text};color:${c.background};font-family:'${f.body}',sans-serif;font-weight:600;font-size:0.88rem;border-radius:2px;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;">${esc(copy.cta||'Kontakt aufnehmen')}</a>
  </div>
</section>`;
}

// ── SERVICES: card-grid ───────────────────────────────────────────────────────
function servicesCardGrid(copy, c, f) {
  const svcs = copy.services || [];
  const cards = svcs.map(s => `
    <div style="background:${c.background};border-radius:8px;padding:36px 28px;box-shadow:0 2px 24px rgba(0,0,0,0.07);border-top:3px solid ${c.accent};">
      <div style="font-size:2.6rem;margin-bottom:18px;line-height:1;">${esc(s.icon||'✦')}</div>
      <h3 style="font-family:'${f.heading}',Georgia,serif;font-size:1.2rem;font-weight:700;color:${c.text};margin-bottom:12px;">${esc(s.name)}</h3>
      <p style="font-family:'${f.body}',sans-serif;font-size:0.88rem;color:${c.text_muted};line-height:1.75;">${esc(s.description)}</p>
    </div>`).join('');
  return `<section id="services" style="padding:110px 6%;background:${c.surface};">
  <div style="max-width:1120px;margin:0 auto;">
    <p style="font-family:'${f.body}',sans-serif;font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:${c.accent};margin-bottom:10px;text-align:center;">Was wir anbieten</p>
    <h2 style="font-family:'${f.heading}',Georgia,serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:800;color:${c.text};text-align:center;margin-bottom:64px;letter-spacing:-0.025em;">Unsere Leistungen</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;">${cards}</div>
  </div>
</section>`;
}

// ── SERVICES: icon-columns ────────────────────────────────────────────────────
function servicesIconCols(copy, c, f) {
  const svcs = copy.services || [];
  const cols = svcs.map(s => `
    <div style="text-align:center;padding:44px 24px;">
      <div style="width:82px;height:82px;background:${c.primary}18;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:2.2rem;">${esc(s.icon||'✦')}</div>
      <h3 style="font-family:'${f.heading}',Georgia,serif;font-size:1.18rem;font-weight:700;color:${c.text};margin-bottom:10px;">${esc(s.name)}</h3>
      <p style="font-family:'${f.body}',sans-serif;font-size:0.87rem;color:${c.text_muted};line-height:1.75;max-width:260px;margin:0 auto;">${esc(s.description)}</p>
    </div>`).join('');
  return `<section id="services" style="padding:110px 6%;background:${c.background};">
  <div style="max-width:1120px;margin:0 auto;">
    <p style="font-family:'${f.body}',sans-serif;font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:${c.accent};margin-bottom:10px;text-align:center;">Was wir anbieten</p>
    <h2 style="font-family:'${f.heading}',Georgia,serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:800;color:${c.text};text-align:center;margin-bottom:16px;letter-spacing:-0.025em;">Unsere Leistungen</h2>
    <div style="width:48px;height:2px;background:${c.accent};margin:0 auto 64px;"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0;">${cols}</div>
  </div>
</section>`;
}

// ── SERVICES: horizontal-feature ─────────────────────────────────────────────
function servicesHorizontal(copy, c, f) {

const HERO = { 'full-bleed-atmospheric': heroAtmospheric, 'split-cinematic': heroCinematic, 'minimal-centered': heroMinimal };
const SERVICES = { 'card-grid': servicesCardGrid, 'icon-columns': servicesIconCols, 'horizontal-feature': servicesHorizontal };
const ABOUT = { 'split-portrait-story': aboutSplit, 'centered-founder': aboutCentered, 'full-text-elegant': aboutElegant };

// ═══════════════════════════════════════════════════════════════════════════════
// PREVIEW BUILDER
// ═══════════════════════════════════════════════════════════════════════════════
function buildPreviewHtml(spec) {
  const { colors: c, fonts: f, sections, layout, copy } = spec;
  const h = f.heading.replace(/ /g, '+');
  const b = f.body.replace(/ /g, '+');
  const gfonts = `https://fonts.googleapis.com/css2?family=${h}:ital,wght@0,400;0,700;0,900;1,400;1,700&family=${b}:wght@400;500;600;700&display=swap`;

  const sectionHtml = (sections || ['hero','services','about','contact']).map(s => {
    const v = (layout||{})[s];
    if (s==='hero')     return (HERO[v]     || heroAtmospheric)(copy, c, f);
    if (s==='services') return (SERVICES[v] || servicesCardGrid)(copy, c, f);
    if (s==='about')    return (ABOUT[v]    || aboutSplit)(copy, c, f);
    if (s==='contact')  return (CONTACT[v]  || contactPhone)(copy, c, f);
    return '';
  }).join('\n');

  return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(copy.business_name)}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="${gfonts}" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'${esc(f.body)}',sans-serif;background:${c.background};color:${c.text}}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
</style>
</head>
<body>
${navHtml(copy, c, f)}
${sectionHtml}
${footerHtml(copy, c, f)}
<script>
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    const el=document.querySelector(a.getAttribute('href'));
    if(el)el.scrollIntoView({behavior:'smooth'});
  });
});
<\/script>
</body>
</html>`;
}

function renderControls(spec) {
  // Mood
  document.getElementById('ctrlPersonality').textContent = spec.personality || '';
  document.getElementById('ctrlMood').textContent = spec.mood || '';

  // Colors
  const colorDefs = [
    { key: 'primary', lbl: 'Primär' },
    { key: 'accent', lbl: 'Akzent' },
    { key: 'background', lbl: 'Hintergrund' },
    { key: 'surface', lbl: 'Fläche' },
    { key: 'text', lbl: 'Text' },
    { key: 'text_muted', lbl: 'Text Hell' },
  ];
  document.getElementById('colorGrid').innerHTML = colorDefs.map(cd => `
    <div class="color-item">
      <span class="color-lbl">${cd.lbl}</span>
      <div class="color-swatch-wrap">
        <div class="color-swatch" id="sw-${cd.key}" style="background:${spec.colors[cd.key]||'#888'}"></div>
        <input type="color" class="color-input" data-key="${cd.key}" value="${spec.colors[cd.key]||'#888888'}" oninput="onColor('${cd.key}',this.value)">
      </div>
    </div>`).join('');

  // Fonts
  document.getElementById('fontPair').innerHTML = `
    <div class="font-badge"><div class="font-badge-lbl">Überschrift</div><div class="font-badge-name">${esc(spec.fonts.heading)}</div></div>
    <div class="font-badge"><div class="font-badge-lbl">Fließtext</div><div class="font-badge-name">${esc(spec.fonts.body)}</div></div>`;

  // Copy
  document.getElementById('copyHeadline').value = spec.copy.headline || '';
  document.getElementById('copyTagline').value  = spec.copy.tagline  || '';
  document.getElementById('copyAbout').value    = spec.copy.about    || '';
  document.getElementById('copyCta').value      = spec.copy.cta      || '';

  // Services
  const svcs = spec.copy.services || [];
  document.getElementById('svcsEditor').innerHTML = svcs.map((s, i) => `
    <div class="svc-item">
      <div class="svc-row">
        <input class="svc-icon-input" type="text" value="${esc(s.icon||'✦')}" maxlength="2" oninput="onSvc(${i},'icon',this.value)">
        <input class="ctrl-input" style="flex:1" type="text" value="${esc(s.name)}" placeholder="Leistungsname" oninput="onSvc(${i},'name',this.value)">
      </div>
      <textarea class="ctrl-ta" style="min-height:56px;" placeholder="Beschreibung" oninput="onSvc(${i},'description',this.value)">${esc(s.description)}</textarea>
    </div>`).join('');

  document.getElementById('controls-area').classList.add('visible');
  document.getElementById('exportBtn').classList.add('visible');
}

function collectSpec() {
  if (!currentSpec) return null;
  const s = JSON.parse(JSON.stringify(currentSpec));
  document.querySelectorAll('[data-key]').forEach(inp => { s.colors[inp.dataset.key] = inp.value; });
  s.copy.headline = document.getElementById('copyHeadline').value;
  s.copy.tagline  = document.getElementById('copyTagline').value;
  s.copy.about    = document.getElementById('copyAbout').value;
  s.copy.cta      = document.getElementById('copyCta').value;
  s.copy.services = Array.from(document.querySelectorAll('.svc-item')).map(item => {
    const ins = item.querySelectorAll('input, textarea');
    return { icon: ins[0]?.value||'✦', name: ins[1]?.value||'', description: ins[2]?.value||'' };
  });
  return s;
}

function onColor(key, val) {
  if (!currentSpec) return;
  currentSpec.colors[key] = val;
  const sw = document.getElementById('sw-' + key);
  if (sw) sw.style.background = val;
  scheduleRender();
}

function onSvc(idx, field, val) {
  if (!currentSpec?.copy?.services?.[idx]) return;
  currentSpec.copy.services[idx][field] = val;
  scheduleRender();
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function generateDesign() {
  const btn = document.getElementById('genBtn');
  const spinner = document.getElementById('genSpinner');
  const btnText = document.getElementById('genBtnText');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Generiere Design…';

  try {
    const resp = await fetch('/api/generator/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ business_id: parseInt(businessId) }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `Fehler ${resp.status}`);
    }
    currentSpec = await resp.json();
    renderControls(currentSpec);
    renderPreview(currentSpec);
    btnText.textContent = '✨ Erneut generieren';
  } catch(e) {
    alert('Fehler: ' + e.message);
    btnText.textContent = '✨ Design generieren';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

// ── Export ────────────────────────────────────────────────────────────────────
async function exportSite() {
  const btn = document.getElementById('exportBtn');
  const spec = collectSpec();
  if (!spec) return;
  btn.disabled = true;
  btn.textContent = '⏳ Erstelle ZIP…';
  try {
    const resp = await fetch('/api/generator/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        business_id: parseInt(businessId),
        html: buildPreviewHtml(spec),
        theme: spec.theme || 'custom',
        sections: spec.sections || [],
      }),
    });
    if (!resp.ok) throw new Error(`Fehler ${resp.status}`);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `website-${(spec.copy.business_name||'export').replace(/\s+/g,'-').toLowerCase()}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.textContent = '✅ ZIP heruntergeladen!';
    setTimeout(() => { btn.textContent = '⬇ Als ZIP exportieren'; btn.disabled = false; }, 3000);
  } catch(e) {
    alert('Export fehlgeschlagen: ' + e.message);
    btn.textContent = '⬇ Als ZIP exportieren';
    btn.disabled = false;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadBizInfo();
</script>
